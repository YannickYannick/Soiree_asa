{% extends 'base.html' %}

{% block title %}Connexion — Afro Night Manager{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-gray-900 rounded-xl border border-gray-800 p-8">
        <h1 class="text-2xl font-bold mb-2 text-center">Connexion</h1>
        <p class="text-gray-400 text-sm text-center mb-6">Afro Night Event Manager</p>

        {% if form.errors %}
        <div class="mb-4 p-3 rounded-lg bg-red-900/30 border border-red-700 text-red-300 text-sm">
            Identifiant ou mot de passe incorrect.
        </div>
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label for="id_username" class="block text-sm text-gray-400 mb-1">Identifiant</label>
                <input type="text" name="username" id="id_username" required autofocus
                       class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white focus:border-purple-500 outline-none">
            </div>
            <div>
                <label for="id_password" class="block text-sm text-gray-400 mb-1">Mot de passe</label>
                <input type="password" name="password" id="id_password" required
                       class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white focus:border-purple-500 outline-none">
            </div>
            <button type="submit"
                    class="w-full py-2.5 bg-purple-600 hover:bg-purple-700 text-white rounded-lg font-medium transition">
                Se connecter
            </button>
        </form>

        <p class="mt-6 text-xs text-gray-500 text-center">
            Admin : accès total · Staff : accès modules
        </p>
    </div>
</div>
{% endblock %}
